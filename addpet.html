</button>

<div class="text-center space-y-1">
<h2 class="font-headline font-bold text-2xl text-primary tracking-tight">Create New Companion</h2>
<p class="text-on-surface-variant text-sm">Choose an avatar or upload a photo later</p>
</div>
</div>

<section class="space-y-6">
<!-- Pet Name Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1">Pet Name</label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-high rounded-2xl border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline-variant" placeholder="Enter your pet's name" type="text"/>
</div>
</div>
<!-- Species Grid -->
<div class="space-y-3">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1">Species</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-primary-container/30 border-2 border-primary/20 text-on-primary-container transition-all">
<span class="material-symbols-outlined text-3xl mb-1">pets</span>
<span class="text-xs font-semibold">Dog</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest transition-all">
<span class="material-symbols-outlined text-3xl mb-1">pets</span>
<span class="text-xs font-semibold">Cat</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest transition-all">
<span class="material-symbols-outlined text-3xl mb-1">egg</span>
<span class="text-xs font-semibold">Other</span>
</button>
</div>
</div>
<!-- Birthday Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1">Birthday</label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-high rounded-2xl border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all text-on-surface" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">calendar_today</span>
</div>
</div>
<!-- Additional Detail: Gender Selection (Asymmetric UI Detail) -->
<div class="space-y-3 pt-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1">Gender</label>
<div class="flex gap-4">
<label class="flex-1 cursor-pointer">
<input checked="" class="hidden peer" name="gender" type="radio"/>
<div class="h-12 flex items-center justify-center rounded-2xl bg-surface-container-high peer-checked:bg-secondary-container peer-checked:text-on-secondary-container transition-all font-medium text-sm">
                            Male
                        </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="hidden peer" name="gender" type="radio"/>
<div class="h-12 flex items-center justify-center rounded-2xl bg-surface-container-high peer-checked:bg-secondary-container peer-checked:text-on-secondary-container transition-all font-medium text-sm">

                        </div>
